<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.1/css/all.css">
    <link rel="stylesheet" href=
  "https://site-assets.fontawesome.com/releases/v6.7.1/css/duotone-regular.css">
  <link rel="stylesheet" href=
  "https://site-assets.fontawesome.com/releases/v6.7.1/css/duotone-light.css">
     <script src="dgi.js"></script><title>Order Confirmation</title>
    <style>
       *,body{padding:0}.header,.info-note{align-items:center}.header,.section,.success{background:#fff}.delivery,.final-price,.header,.order-success,.promo{font-weight:700}*{margin:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background-color:#f4f6f9}.header{display:flex;padding:15px;font-size:18px}.back-button{font-size:22px;margin-right:10px;cursor:pointer;color:#333}.success{text-align:center;padding:30px 20px;border-radius:0 0 10px 10px}.checkmark-container{position:relative;display:inline-block;margin-bottom:15px}.checkmark{width:100px;height:100px}.order-success{font-size:20px;color:#333}.order-id{color:#e91e63;font-size:14px;margin-top:5px}.section{padding:15px;margin:10px 15px;border-radius:8px}.section h3{font-size:16px;margin-bottom:8px;color:#333;text-transform:uppercase}.section p{font-size:14px;color:#555;margin:5px 0}.change-btn{float:right;padding:5px 10px;font-size:12px;border:none;border-radius:5px;background:#000;color:#fff}.info-note{display:flex;font-size:12px;color:#888;margin-top:10px}.info-note::before{content:"ⓘ";margin-right:5px;font-size:14px}.delivery{display:flex;align-items:center;padding:15px;font-size:14px;color:#e91e63;background:#fff;margin:10px 15px;border-radius:8px}.delivery-icon{width:18px;height:18px;margin-right:8px}.final-price,.price-summary p{font-size:14px;display:flex;margin:8px 0}.price-summary p{justify-content:space-between;color:#000}.promo{color:green}hr{border:.5px solid #ddd;margin:10px 0}.final-price{color:#333;justify-content:space-between}    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <span class="back-button" onclick="location.replace('index.html')"><i class="fas fa-arrow-left"></i></span>
        Order Placed
    </div>

    <!-- Success Message -->
    <div class="success">
        <div class="checkmark-container">
            <img src="done.gif" alt="Success" class="checkmark">
         </div>
        <p class="order-success">Your Order is Successful</p>
        <p class="order-id">Order Id: #<span id="order-id"></span></p>
    </div>

    <!-- Sender Info -->
    <div class="section">
        <h3>Receiver Info <button class="change-btn" id="tracking">Track Orders</button></h3>
        <p><span id="sender-name"></span></p>
        <p><span id="sender-phone"></span></p>
        <p style="color:gray;" class="info-note">This info will be displayed on the package sent to customer.</p>
    </div>

    <!-- Estimated Delivery -->
    <div class="delivery">
        <span class="delivery-icon">🚚</span>
        <p>VitaGlow team will contact you within 6 hour!</p>
    </div>

    <!-- Price Summary -->
    <div class="section">
        <h3>Price Summary</h3>
        <div class="price-summary">
            <p>Product price <span>৳ <span id="product-price"></span></span></p>
            <p>Shipping Charge <span>৳ <span id="shipping-charge"></span></span></p>
            <p class="promo">Discount<span id="promo-code"></span> <span> <span id="discount"></span></span></p>
        </div>
        <hr>
        <p class="final-price">Order Total <span>৳ <span id="order-total"></span></span></p>
        <p class="final-price">Final Customer Price <span>৳ <span id="final-price"></span></span></p>
    </div>

    <script>
        // Function to get and parse URL parameters
 function getOrderDataFromURL(){let e=new URLSearchParams(window.location.search),t={orderId:e.get("id")||"N/A",fullName:e.get("name")||"N/A",phone:e.get("phone")||"N/A",shippingCost:parseFloat(e.get("ship"))||0,productPrice:parseFloat(e.get("price"))||0,discount:parseFloat(e.get("dis"))||0,totalSum:parseFloat(e.get("total"))||0};return t}const order=getOrderDataFromURL(),trackingElement=document.getElementById("tracking");function displayOrderData(){try{let e=order.productPrice,t={"order-id":order.orderId,"sender-name":order.fullName,"sender-phone":order.phone,"product-price":order.productPrice.toFixed(2),"shipping-charge":order.shippingCost.toFixed(2),discount:order.discount.toFixed(2),"order-total":e.toFixed(2),"final-price":order.totalSum.toFixed(2)};for(let[r,o]of Object.entries(t)){let n=document.getElementById(r);n?n.textContent=o:console.warn(`Element with ID '${r}' not found`)}}catch(d){document.body.innerHTML+="<p>Error loading order details</p>"}}trackingElement?trackingElement.addEventListener("click",function(){window.location.href=`orderlist.html?phone=${encodeURIComponent(order.phone)}`}):console.warn("Tracking element not found in DOM"),window.addEventListener("DOMContentLoaded",function(){localStorage.removeItem("order"),displayOrderData()}); </script>
</body>
</html>
